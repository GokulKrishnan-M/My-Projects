{% extends "common.html" %}
{% load static %}
{% block hero %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<style>
    #topnav,
    #back-to-top {
        display: none !important;
    }

    body {
        background: #0b0f1b;
    }

    .auth-hero {
        position: relative;
        min-height: 100vh;
        padding: 90px 0;
        display: flex;
        align-items: center;
        background:
            radial-gradient(circle at 50% 0%, rgba(70, 120, 255, 0.22), transparent 45%),
            linear-gradient(135deg, #2c5aa0 0%, #1e3a5f 50%, #0d2a47 100%);
        overflow: hidden;
        color: #e9eefc;
    }

    .auth-hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
            repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0 1px, transparent 1px 140px),
            repeating-linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 140px),
            radial-gradient(circle at 18% 20%, rgba(49, 91, 255, 0.2), transparent 35%),
            radial-gradient(circle at 80% 26%, rgba(72, 210, 255, 0.18), transparent 32%);
        opacity: 0.5;
        pointer-events: none;
        z-index: 1;
    }

    .auth-hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 50% 10%, rgba(10, 18, 38, 0.4), transparent 60%),
            linear-gradient(180deg, rgba(9, 12, 24, 0.55), rgba(7, 10, 20, 0.85));
        pointer-events: none;
        z-index: 1;
    }

    .auth-hero-photo {
        position: absolute;
        inset: 0;
        background: url("{% static '/assets/images/bg/0110.jpg' %}") center/cover no-repeat;
        opacity: 0.22;
        filter: saturate(1.05) contrast(1.05);
        z-index: 0;
    }

    .auth-shell {
        position: relative;
        z-index: 2;
    }

    .auth-brand-float {
        position: absolute;
        top: 28px;
        left: 28px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        z-index: 3;
    }

    .auth-brand-float img {
        width: 44px;
        height: 44px;
    }

    .auth-brand-float span {
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        color: #f4f7ff;
    }

    .auth-brand-float small {
        display: block;
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9bb5ff;
        margin-top: 2px;
    }

    .auth-back {
        width: 46px;
        height: 46px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        border: 1px solid rgba(120, 156, 255, 0.2);
        background: linear-gradient(145deg, #11182a, #0b1220);
        color: #9fb7ff;
        text-decoration: none;
        box-shadow: 0 12px 24px rgba(6, 10, 20, 0.35);
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
        position: relative;
    }

    .auth-back i {
        font-size: 1.1rem;
        position: relative;
        z-index: 1;
    }

    .auth-back::before {
        content: "";
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 1.5px solid rgba(120, 156, 255, 0.35);
        position: absolute;
        inset: 0;
        margin: auto;
        box-shadow: inset 0 0 0 1px rgba(15, 20, 35, 0.2);
    }

    .auth-back:hover {
        background: linear-gradient(145deg, #151f36, #0c1527);
        color: #e4edff;
        border-color: rgba(120, 156, 255, 0.4);
        transform: translateY(-1px);
    }

    .auth-card {
        background: rgba(12, 16, 27, 0.92);
        border-radius: 26px;
        border: 1px solid rgba(120, 156, 255, 0.22);
        box-shadow: 0 30px 80px rgba(4, 8, 22, 0.6);
        padding: 36px 32px;
        backdrop-filter: blur(18px);
    }

    .auth-icon {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: rgba(120, 156, 255, 0.18);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #8fb0ff;
        font-size: 1.6rem;
        margin: 0 auto 18px;
        box-shadow: inset 0 0 0 1px rgba(120, 156, 255, 0.2);
    }

    .auth-heading {
        font-size: 1.35rem;
        font-weight: 700;
        text-align: center;
        color: #eef2ff;
    }

    .auth-caption {
        text-align: center;
        color: #94a3c8;
        font-size: 0.9rem;
        margin-bottom: 24px;
    }

    .auth-input {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 14px;
        border: 1px solid rgba(120, 156, 255, 0.35);
        background: rgba(255, 255, 255, 0.08);
        padding: 0.75rem 0.95rem;
        margin-bottom: 16px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .auth-input:focus-within {
        border-color: rgba(120, 156, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(76, 124, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
    }

    .auth-input i {
        color: #88a5ff;
        font-size: 1rem;
    }

    .auth-input .form-control {
        border: 0;
        background: transparent;
        padding: 0;
        color: #ffffff !important;
        flex: 1;
        min-width: 0;
        font-weight: 500;
        caret-color: #9db7ff;
    }

    .auth-input .form-control::placeholder {
        color: #ffffff;
        opacity: 0.85;
    }

    .auth-card .btn-primary {
        border-radius: 12px;
        padding: 0.85rem 1.4rem;
        font-weight: 700;
        background: linear-gradient(135deg, #2f6bff 0%, #3aa9ff 100%);
        border: 0;
        box-shadow: 0 16px 32px rgba(46, 120, 255, 0.32);
    }

    .auth-helper {
        text-align: center;
        margin-top: 14px;
    }

    .auth-helper a {
        color: #9bb5ff;
        font-size: 0.85rem;
        text-decoration: none;
    }
</style>

<section class="auth-hero">
    <div class="auth-hero-photo"></div>
    <div class="auth-brand-float">
        <a class="auth-back" href="/login/" aria-label="Back to login">
            <i class="ri-arrow-left-line"></i>
        </a>
        <img src="{% static '/assets/images/logo-icon.png' %}" alt="Medical Advisor logo">
        <div>
            <span>Medical Advisor</span>
            <small>Password Reset</small>
        </div>
    </div>
    <div class="container auth-shell">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card">
                    <div class="auth-icon"><i class="ri-key-2-line"></i></div>
                    <h4 class="auth-heading">Forgot your password?</h4>
                    <p class="auth-caption">Enter your registered email and we will help you reset it.</p>
                    <form method="POST" action="{% url 'forgot_password' %}">
                        {% csrf_token %}
                        <div class="auth-input">
                            <i class="ri-mail-line"></i>
                            <input type="email" class="form-control" placeholder="Email address" name="email" required="">
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-primary">Send Reset Link</button>
                        </div>
                    </form>
                    <div class="auth-helper">
                        <a href="/login/">Back to sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
