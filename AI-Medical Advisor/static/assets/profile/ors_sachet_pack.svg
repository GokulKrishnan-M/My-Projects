    </text>

    <circle cx="404" cy="340" r="74" fill="#edf7ff" stroke="#bcd7f5" stroke-width="4"/>
    <path d="M404 285 C360 340, 372 397, 404 418 C436 397, 448 340, 404 285 Z" fill="#36a3ff"/>
    <path d="M389 352 L404 318 L419 352 L442 352 L411 388 L423 432 L404 405 L385 432 L397 388 L366 352 Z" fill="#1e77e8"/>
  </g>

  <g transform="translate(760,220) rotate(8)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="620" rx="26" fill="url(#packet)" stroke="#cfe0ef" stroke-width="4"/>
    <rect x="0" y="0" width="520" height="86" rx="26" fill="#1d6fe4"/>
    <rect x="0" y="74" width="520" height="18" fill="#1d6fe4"/>
    <rect x="0" y="470" width="520" height="92" fill="#1fa9d8"/>

    <text x="58" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="78" font-weight="700" fill="#16356c">
