<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef8ff"/>
      <stop offset="100%" stop-color="#dceffd"/>
    </linearGradient>
    <linearGradient id="packet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f2f8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#55708d" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(260,160) rotate(-10)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="620" rx="26" fill="url(#packet)" stroke="#cfe0ef" stroke-width="4"/>
    <rect x="0" y="0" width="520" height="86" rx="26" fill="#1d6fe4"/>
    <rect x="0" y="74" width="520" height="18" fill="#1d6fe4"/>
    <rect x="38" y="138" width="444" height="120" rx="18" fill="#f4fbff" stroke="#dbe9f7" stroke-width="3"/>
    <rect x="0" y="470" width="520" height="92" fill="#21b37f"/>

    <text x="56" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="86" font-weight="700" fill="#16356c">
      ORS
    </text>
    <text x="58" y="310" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="600" fill="#2d5a96">
      Oral Rehydration Salts
    </text>
    <text x="58" y="384" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="500" fill="#476588">
