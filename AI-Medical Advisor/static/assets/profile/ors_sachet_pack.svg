    </text>
    <text x="58" y="525" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">
      Sachet for oral solution
    </text>

    <rect x="334" y="152" width="120" height="180" rx="18" fill="#f8fcff" stroke="#d7e7f7" stroke-width="3"/>
    <path d="M394 188 C354 230, 362 278, 394 302 C426 278, 434 230, 394 188 Z" fill="#33b5ff"/>
    <path d="M383 236 L394 212 L405 236 L421 236 L399 263 L408 295 L394 277 L380 295 L389 263 L367 236 Z" fill="#1b79e7"/>
