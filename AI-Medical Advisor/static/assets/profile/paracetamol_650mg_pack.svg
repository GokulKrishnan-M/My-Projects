<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8ebfa"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5e6775"/>
      <stop offset="50%" stop-color="#8d98ab"/>
      <stop offset="100%" stop-color="#4b5360"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#506070" flood-opacity="0.28"/>
    </filter>
    <pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#aeb6c4" opacity="0.7"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(170,430) rotate(-18)" filter="url(#shadow)">
    <rect x="0" y="0" width="660" height="430" rx="18" fill="url(#foil)"/>
    <rect x="8" y="8" width="644" height="414" rx="15" fill="url(#dots)" opacity="0.6"/>

    <g fill="#fefefe" stroke="#d8dfe8" stroke-width="3">
      <rect x="55" y="55" width="120" height="58" rx="28"/>
      <rect x="235" y="55" width="120" height="58" rx="28"/>
      <rect x="415" y="55" width="120" height="58" rx="28"/>
      <rect x="55" y="170" width="120" height="58" rx="28"/>
      <rect x="235" y="170" width="120" height="58" rx="28"/>
      <rect x="415" y="170" width="120" height="58" rx="28"/>
      <rect x="55" y="285" width="120" height="58" rx="28"/>
      <rect x="235" y="285" width="120" height="58" rx="28"/>
      <rect x="415" y="285" width="120" height="58" rx="28"/>
    </g>
  </g>

  <g transform="translate(520,120) rotate(-15)" filter="url(#shadow)">
    <rect x="0" y="0" width="930" height="560" rx="10" fill="#ffffff"/>
    <rect x="0" y="0" width="930" height="560" rx="10" fill="none" stroke="#dfe4ea" stroke-width="3"/>

    <text x="88" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="700" fill="#121212">
      Paracetamol
    </text>
    <text x="92" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="600" fill="#111111">
      650mg
    </text>
    <text x="92" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="500" fill="#f02849">
      tablets
    </text>

    <rect x="0" y="350" width="930" height="150" fill="#f3173d"/>
    <text x="465" y="440" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="500" fill="#ffffff">
      Oral use / 20 tablets
    </text>

    <rect x="650" y="26" width="240" height="42" fill="#f3173d" opacity="0.12"/>
  </g>
</svg>
